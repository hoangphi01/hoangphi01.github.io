<script>
    function lsGet(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
    function lsSet(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }

    // Page transition system
    function getTransitionColor() {
        return document.body.classList.contains('dark-mode') ? '#1e1e2e' : '#ffffff';
    }

    // Fade-in on page load
    (function() {
        var overlay = document.createElement('div');
        overlay.className = 'page-transition';
        overlay.style.background = getTransitionColor();
        document.body.appendChild(overlay);
        requestAnimationFrame(function() {
            overlay.classList.add('fade-in');
        });
        overlay.addEventListener('transitionend', function() { overlay.remove(); });
    })();

    // Intercept cross-page nav links for smooth transition
    document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        // Only intercept full page navigations (not hash-only links)
        if (!href || href.startsWith('#') || href.startsWith('javascript') || link.target === '_blank') return;
        // Skip if it's a data-page tab link (handled by pages.js)
        if (link.dataset.page) return;
        e.preventDefault();
        var overlay = document.createElement('div');
        overlay.className = 'page-transition fade-in';
        overlay.style.background = getTransitionColor();
        overlay.style.transition = 'opacity 0.25s cubic-bezier(0.4, 0, 1, 1)';
        document.body.appendChild(overlay);
        requestAnimationFrame(function() {
            overlay.classList.remove('fade-in');
            overlay.classList.add('fade-out');
        });
        setTimeout(function() { location.href = href; }, 250);
    });

    const card = document.querySelector('.profile-card');
    const dockIcon = document.getElementById('dock-icon');
    const dotClose = document.getElementById('dot-close');
    const dotMinimize = document.getElementById('dot-minimize');
    const dotFullscreen = document.getElementById('dot-fullscreen');
    let isFullscreen = false;

    // Keyboard support for macOS dots
    function onKeyActivate(el, handler) {
        el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                handler();
            }
        });
    }

    function doClose() {
        card.classList.add('card-close');
        setTimeout(() => {
            card.style.display = 'none';
            setTimeout(() => {
                dockIcon.classList.add('dock-show');
                dockIcon.title = 'Click to reopen';
            }, 500);
        }, 400);
    }

    function doMinimize() {
        card.classList.add('card-minimize');
        setTimeout(() => {
            card.style.display = 'none';
            dockIcon.classList.add('dock-show');
        }, 400);
    }

    function doFullscreen() {
        if (isFullscreen) {
            card.classList.remove('card-fullscreen');
            isFullscreen = false;
            lsSet('card-fullscreen', 'false');
        } else {
            card.classList.add('card-fullscreen');
            isFullscreen = true;
            lsSet('card-fullscreen', 'true');
        }
    }

    // Red dot - Close
    dotClose.addEventListener('click', doClose);
    onKeyActivate(dotClose, doClose);

    // Yellow dot - Minimize
    dotMinimize.addEventListener('click', doMinimize);
    onKeyActivate(dotMinimize, doMinimize);

    // Green dot - Fullscreen toggle (persisted via localStorage)
    if (lsGet('card-fullscreen') === 'true') {
        card.classList.add('card-fullscreen');
        isFullscreen = true;
    }

    dotFullscreen.addEventListener('click', doFullscreen);
    onKeyActivate(dotFullscreen, doFullscreen);

    // Profile toggle (mobile)
    const btnToggle = document.getElementById('btn-toggle-profile');
    const profileDetails = document.getElementById('profile-details');
    const profileCollapsed = document.getElementById('profile-collapsed');
    let profileVisible = true;

    btnToggle.addEventListener('click', () => {
        if (profileVisible) {
            profileDetails.classList.add('profile-hidden');
            profileCollapsed.classList.add('profile-collapsed-show');
            btnToggle.innerHTML = '<i class="bi bi-chevron-down"></i> Show';
            profileVisible = false;
        } else {
            profileDetails.classList.remove('profile-hidden');
            profileCollapsed.classList.remove('profile-collapsed-show');
            btnToggle.innerHTML = '<i class="bi bi-chevron-up"></i> Hide';
            profileVisible = true;
        }
    });

    // Sidebar collapse/expand (desktop) - persisted via localStorage
    const btnCollapse = document.getElementById('btn-collapse-sidebar');
    const btnExpand = document.getElementById('btn-expand-sidebar');
    const cardRow = document.getElementById('card-row');

    if (btnCollapse && btnExpand && cardRow) {
        if (lsGet('sidebar-collapsed') === 'true') {
            cardRow.classList.add('sidebar-collapsed');
        }

        btnCollapse.addEventListener('click', () => {
            cardRow.classList.add('sidebar-collapsed');
            lsSet('sidebar-collapsed', 'true');
        });

        btnExpand.addEventListener('click', () => {
            cardRow.classList.remove('sidebar-collapsed');
            lsSet('sidebar-collapsed', 'false');
        });
    }

    // Dock icon - Restore
    dockIcon.addEventListener('click', () => {
        card.style.display = '';
        card.classList.remove('card-close', 'card-minimize');
        dockIcon.classList.remove('dock-show');
        // Trigger reflow for animation
        void card.offsetWidth;
        card.classList.add('card-restore');
        setTimeout(() => {
            card.classList.remove('card-restore');
        }, 400);
    });
</script>
