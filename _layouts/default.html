<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4S2GCSPB4S"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4S2GCSPB4S');
    </script>
    <title>{% if page.title %}{{ page.title }} | {% endif %}PHAM Hoang Phi</title>
    <!-- Open Graph -->
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}PHAM Hoang Phi{% endif %}">
    <meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncate: 200 }}">
    <meta property="og:image" content="{{ site.url }}{{ '/' | relative_url }}background.jpg">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PHAM Hoang Phi">
    <meta name="description" content="{{ page.description | default: site.description | strip_html | truncate: 200 }}">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}PHAM Hoang Phi{% endif %}">
    <meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | truncate: 200 }}">
    <meta name="twitter:image" content="{{ site.url }}{{ '/' | relative_url }}background.jpg">
    <link rel="icon" type="image/svg+xml" href="{{ '/' | relative_url }}favicon.svg">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></noscript>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"></noscript>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="{{ '/' | relative_url }}style.css">
    <style>
        .page-transition {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 99999; pointer-events: none;
            opacity: 1; transition: opacity 0.3s cubic-bezier(0, 0, 0.2, 1);
        }
        .page-transition.fade-out { opacity: 1; pointer-events: all; }
        .page-transition.fade-in { opacity: 0; }
    </style>
</head>
<body>

<a class="skip-link" href="#page-content" style="position:absolute;top:-50px">Skip to content</a>

<div class="page-wrapper">
    <div class="card profile-card">
        <div class="macos-dots">
            <span class="dot dot-red" id="dot-close" title="Close" role="button" tabindex="0" aria-label="Close"></span>
            <span class="dot dot-yellow" id="dot-minimize" title="Minimize" role="button" tabindex="0" aria-label="Minimize"></span>
            <span class="dot dot-green" id="dot-fullscreen" title="Fullscreen" role="button" tabindex="0" aria-label="Fullscreen"></span>
        </div>
        <div class="card-body p-0">
            <div class="row g-0" id="card-row">
                <!-- Expand button (shown when sidebar collapsed) -->
                <button class="btn-expand-sidebar" id="btn-expand-sidebar" title="Show sidebar">
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"/></svg>
                </button>

                <!-- Left Column - Profile -->
                {% include sidebar.html %}

                <!-- Right Column -->
                <div class="col-lg-8 content-area">
                    {{ content }}
                </div>
            </div>
        </div>
    </div>

    <!-- Dock icon for minimized state -->
    <div class="dock-icon" id="dock-icon" title="Click to restore">
        <img src="{{ '/' | relative_url }}_icons/finder_logo.webp" alt="Finder" loading="lazy">
    </div>
</div>

{% include card-scripts.html %}
</body>
</html>
