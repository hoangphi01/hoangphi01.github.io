<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}PHAM Hoang Phi</title>
    <!-- Open Graph -->
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}PHAM Hoang Phi{% endif %}">
    <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
    <meta property="og:image" content="{{ site.url }}{{ '/' | relative_url }}background.jpg">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PHAM Hoang Phi">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}PHAM Hoang Phi{% endif %}">
    <meta name="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
    <meta name="twitter:image" content="{{ site.url }}{{ '/' | relative_url }}background.jpg">
    <link rel="icon" type="image/x-icon" href="{{ '/' | relative_url }}favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/' | relative_url }}style.css">
</head>
<body>

<div class="page-wrapper">
    <div class="card profile-card">
        <div class="macos-dots">
            <span class="dot dot-red" id="dot-close" title="Close"></span>
            <span class="dot dot-yellow" id="dot-minimize" title="Minimize"></span>
            <span class="dot dot-green" id="dot-fullscreen" title="Fullscreen"></span>
        </div>
        <div class="card-body p-0">
            <div class="row g-0" id="card-row">
                <!-- Expand button (shown when sidebar collapsed) -->
                <button class="btn-expand-sidebar" id="btn-expand-sidebar" title="Show sidebar">
                    <i class="bi bi-chevron-right"></i>
                </button>

                <!-- Left Column - Profile -->
                {% include sidebar.html %}

                <!-- Right Column -->
                <div class="col-lg-8 content-area">
                    {{ content }}
                </div>
            </div>
        </div>
    </div>

    <!-- Dock icon for minimized state -->
    <div class="dock-icon" id="dock-icon" title="Click to restore">
        <img src="{{ '/' | relative_url }}background.jpg" alt="Profile">
    </div>
</div>

{% include card-scripts.html %}
</body>
</html>
