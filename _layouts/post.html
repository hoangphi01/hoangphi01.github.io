<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | PHAM Hoang Phi</title>
    <link rel="icon" type="image/x-icon" href="{{ '/' | relative_url }}favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/' | relative_url }}style.css">
</head>
<body>

<div class="page-wrapper">
    <div class="card profile-card post-card">
        <div class="card-body p-0">
            <div class="post-layout">
                <!-- Navigation buttons -->
                <div class="post-header">
                    <div class="post-header-buttons">
                        <a href="{{ '/' | relative_url }}" class="btn-back" title="Home">
                            <i class="bi bi-house-door-fill"></i>
                        </a>
                        <a href="{{ '/' | relative_url }}blog/" class="btn-back" title="Back to blog">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </div>
                    <nav class="post-breadcrumb">
                        <a href="{{ '/' | relative_url }}">Home</a>
                        <span class="breadcrumb-sep">&gt;</span>
                        <a href="{{ '/' | relative_url }}blog/">Blog</a>
                        {% if page.category %}
                        <span class="breadcrumb-sep">&gt;</span>
                        <span class="breadcrumb-topic">{{ page.category }}</span>
                        {% endif %}
                        <span class="breadcrumb-sep">&gt;</span>
                        <span class="breadcrumb-current">{{ page.title }}</span>
                    </nav>
                    <div class="post-header-actions">
                        <button class="btn-back" id="btn-print" title="Print">
                            <i class="bi bi-printer-fill"></i>
                        </button>
                        <button class="btn-back" id="btn-share" title="Share">
                            <i class="bi bi-share-fill"></i>
                        </button>
                    </div>
                </div>

                <!-- Post content -->
                <div class="post-body blog-content" id="post-body">
                    <!-- Sticky title bar (appears on scroll) -->
                    <div class="post-sticky-title" id="sticky-title">
                        <span class="post-sticky-title-text">{{ page.title }}</span>
                    </div>

                    <article class="blog-post">
                        <h1 class="blog-post-title" id="post-title">{{ page.title }}</h1>
                        <div class="blog-post-meta">
                            <span><i class="bi bi-calendar3"></i> {{ page.date | date: "%B %d, %Y" }}</span>
                            {% if page.tags %}
                            <span class="blog-post-tags">
                                {% for tag in page.tags %}
                                <span class="badge blog-tag">{{ tag }}</span>
                                {% endfor %}
                            </span>
                            {% endif %}
                        </div>
                        <hr>
                        {{ content }}
                    </article>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Back to top button -->
<button class="btn-back-to-top" id="btn-top" title="Back to top">
    <i class="bi bi-chevron-up"></i>
</button>

<script>
    // Sticky title on scroll (works for both desktop card scroll and mobile body scroll)
    const postBody = document.getElementById('post-body');
    const postTitle = document.getElementById('post-title');
    const stickyTitle = document.getElementById('sticky-title');

    function checkStickyTitle() {
        const rect = postTitle.getBoundingClientRect();
        if (rect.bottom < 0) {
            stickyTitle.classList.add('visible');
        } else {
            stickyTitle.classList.remove('visible');
        }
    }

    // Back to top button
    const btnTop = document.getElementById('btn-top');

    function checkScroll() {
        checkStickyTitle();
        const scrollPos = postBody.scrollTop || window.scrollY;
        if (scrollPos > 400) {
            btnTop.classList.add('visible');
        } else {
            btnTop.classList.remove('visible');
        }
    }

    btnTop.addEventListener('click', () => {
        postBody.scrollTo({ top: 0, behavior: 'smooth' });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Remember scroll position
    const scrollKey = 'scroll_post_' + location.pathname;

    function savePostScroll() {
        const pos = postBody.scrollTop || window.scrollY;
        localStorage.setItem(scrollKey, pos);
    }

    const savedPos = parseInt(localStorage.getItem(scrollKey));
    if (savedPos) {
        postBody.scrollTop = savedPos;
        if (!postBody.scrollTop) window.scrollTo(0, savedPos);
    }

    postBody.addEventListener('scroll', () => { checkScroll(); savePostScroll(); });
    window.addEventListener('scroll', () => { checkScroll(); savePostScroll(); });

    document.getElementById('btn-print').addEventListener('click', () => {
        window.print();
    });

    document.getElementById('btn-share').addEventListener('click', async () => {
        await navigator.clipboard.writeText(window.location.href);
        const toast = document.createElement('div');
        toast.className = 'copy-toast';
        toast.textContent = 'The link of the blog post is copied';
        document.body.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('copy-toast-show'));
        setTimeout(() => {
            toast.classList.remove('copy-toast-show');
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    });
</script>
</body>
</html>
