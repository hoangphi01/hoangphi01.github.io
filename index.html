<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHAM Hoang Phi</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-wrapper">
    <div class="card profile-card">
        <div class="macos-dots">
            <span class="dot dot-red" id="dot-close" title="Close"></span>
            <span class="dot dot-yellow" id="dot-minimize" title="Minimize"></span>
            <span class="dot dot-green" id="dot-fullscreen" title="Fullscreen"></span>
        </div>
        <div class="card-body p-0">
            <div class="row g-0">
                <!-- Left Column - Profile -->
                <div class="col-lg-4 profile-sidebar text-center">
                    <h3 class="mb-4">( •_•)</h3>

                    <div class="profile-img-wrapper">
                        <img src="profile_picture.jpg" alt="Profile picture" class="profile-img">
                    </div>

                    <div class="profile-info">
                        <small class="text-muted">Master</small>
                        <h5 class="profile-name">PHAM HOANG PHI</h5>
                        <p class="mb-0">Student at</p>
                        <p>University of Debrecen</p>

                        <hr class="divider">

                        <address>
                            <i class="bi bi-geo-alt"></i> Debrecen, Hajdu-Bihar, Hungary
                        </address>

                        <!-- Social Links -->
                        <div class="social-links">
                            <a href="mailto:hoangphi.works@gmail.com" title="Email"><i class="bi bi-envelope-fill"></i></a>
                            <a href="https://www.linkedin.com/in/hoangphi01/" target="_blank" title="LinkedIn"><i class="bi bi-linkedin"></i></a>
                            <a href="https://github.com/hoangphi01" target="_blank" title="GitHub"><i class="bi bi-github"></i></a>
                        </div>

                        <hr class="divider">

                        <!-- Skill Tags -->
                        <div class="skill-tags">
                            <span class="badge">C#</span>
                            <span class="badge">MATLAB</span>
                            <span class="badge">Python</span>
                            <span class="badge">JavaScript</span>
                            <span class="badge">ASP.NET</span>
                            <span class="badge">AI/ML</span>
                        </div>

                        <small class="text-muted d-block mt-3">Updated: Feb 2026</small>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="col-lg-8 content-area">
                    <ul class="nav nav-pills">
                        <li class="nav-item"><a class="nav-link active" href="#home" data-page="home"><i class="bi bi-house-door"></i> Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="#research" data-page="research"><i class="bi bi-journal-text"></i> Research</a></li>
                        <li class="nav-item"><a class="nav-link" href="#awards" data-page="awards"><i class="bi bi-trophy"></i> Awards</a></li>
                        <li class="nav-item"><a class="nav-link" href="#contact" data-page="contact"><i class="bi bi-person-lines-fill"></i> Contact</a></li>
                        <li class="nav-item"><a class="nav-link" href="#tools" data-page="tools"><i class="bi bi-tools"></i> Tools</a></li>
                    </ul>

                    <div class="tab-content" id="page-content"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dock icon for minimized state -->
    <div class="dock-icon" id="dock-icon" title="Click to restore">
        <img src="profile_picture.jpg" alt="Profile">
    </div>
</div>

<script src="pages.js"></script>
<script>
    const card = document.querySelector('.profile-card');
    const dockIcon = document.getElementById('dock-icon');
    const dotClose = document.getElementById('dot-close');
    const dotMinimize = document.getElementById('dot-minimize');
    const dotFullscreen = document.getElementById('dot-fullscreen');
    let isFullscreen = false;

    // Red dot - Close
    dotClose.addEventListener('click', () => {
        card.classList.add('card-close');
        setTimeout(() => {
            card.style.display = 'none';
            // Show a reopen hint after a moment
            setTimeout(() => {
                dockIcon.classList.add('dock-show');
                dockIcon.title = 'Click to reopen';
            }, 500);
        }, 400);
    });

    // Yellow dot - Minimize
    dotMinimize.addEventListener('click', () => {
        card.classList.add('card-minimize');
        setTimeout(() => {
            card.style.display = 'none';
            dockIcon.classList.add('dock-show');
        }, 400);
    });

    // Green dot - Fullscreen toggle
    dotFullscreen.addEventListener('click', () => {
        if (isFullscreen) {
            card.classList.remove('card-fullscreen');
            isFullscreen = false;
        } else {
            card.classList.add('card-fullscreen');
            isFullscreen = true;
        }
    });

    // Dock icon - Restore
    dockIcon.addEventListener('click', () => {
        card.style.display = '';
        card.classList.remove('card-close', 'card-minimize');
        dockIcon.classList.remove('dock-show');
        // Trigger reflow for animation
        void card.offsetWidth;
        card.classList.add('card-restore');
        setTimeout(() => {
            card.classList.remove('card-restore');
        }, 400);
    });
</script>
</body>
</html>
